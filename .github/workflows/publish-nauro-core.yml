name: Publish nauro-core to PyPI

on:
  push:
    tags: ["nauro-core-v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi-nauro-core
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build packages/nauro-core/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/nauro-core/dist/
