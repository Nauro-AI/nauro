name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.8
      - run: ruff check packages/
      - run: ruff format --check packages/

  test-nauro-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --package nauro-core --all-extras
      - run: uv run --package nauro-core pytest packages/nauro-core/tests/ -v --tb=short

  test-nauro:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --package nauro --all-extras
      - run: uv run --package nauro pytest packages/nauro/tests/ -v --tb=short -m "not integration"
